services:
  - type: web
    name: zone-1-entity-explorer
    env: python
    region: frankfurt # Or your preferred region
    plan: free # Can be changed to a paid plan later
    buildCommand: "./render-build.sh"
    startCommand: "gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: LLM_MODEL
        value: "llama-3.3-70b-versatile"
      - key: LLM_BASE_URL
        value: "https://api.groq.com/openai/v1"
      - key: UPLOAD_DIR
        value: "uploads"
      - key: PYTHON_VERSION
        value: 3.10.12 # Or any other version supported by Render
